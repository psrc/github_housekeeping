name: Organization Governance

on:
#  schedule:
#    - cron: '0 6 1 3,9 *'
  workflow_dispatch:

jobs:
  governance:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        shell: bash
        run: |
          Rscript -e "install.packages(c('gh', 'dplyr', 'purrr', 'yaml', 'stringr'), repos = 'https://cloud.r-project.org')"

      - name: Run governance automation
        shell: bash
        run: Rscript R/main.R
